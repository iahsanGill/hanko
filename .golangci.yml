run:
  timeout: 5m

linters:
  disable-all: true
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell

issues:
  exclude-rules:
    # Test files routinely use t.Errorf style without checking errcheck.
    - path: _test\.go
      linters:
        - errcheck
