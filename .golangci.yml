version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - misspell
    - staticcheck
    - unused
  exclusions:
    rules:
      # Test files routinely use t.Errorf style without checking errcheck.
      - path: _test\.go
        linters:
          - errcheck
