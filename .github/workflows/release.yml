# Tag-triggered release workflow.
#
# Push a tag like `v0.2.0`:
#   git tag -a v0.2.0 -m "v0.2.0" && git push origin v0.2.0
#
# The workflow then:
#   1. builds `hanko` for {linux,darwin}/{amd64,arm64},
#   2. records sha256 for each binary,
#   3. creates (or updates) a GitHub Release at the tag with the
#      binaries + checksums attached and the matching CHANGELOG
#      section pulled into the release body.
#
# It does NOT sign the binaries with Sigstore in this iteration; that
# wiring lands in a follow-up once hanko's own keyless flow has stable
# end-to-end runs.

name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        os: [linux, darwin]
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true
      - name: Build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: '0'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          go build \
            -trimpath \
            -ldflags "-s -w -X github.com/iahsanGill/hanko/internal/version.Version=${VERSION}" \
            -o "dist/hanko-${VERSION}-${GOOS}-${GOARCH}" \
            ./cmd/hanko
      - name: Checksum
        run: |
          cd dist
          shasum -a 256 hanko-* | tee "hanko-${GITHUB_REF_NAME#v}-${{ matrix.os }}-${{ matrix.arch }}.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: hanko-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/*
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Extract changelog section
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Pull the section between `## [<version>]` and the next `## `.
          awk -v ver="${VERSION}" '
            $0 ~ "^## \\[" ver "\\]" {flag=1; next}
            /^## \[/ {flag=0}
            flag
          ' CHANGELOG.md > release-notes.md
          # If the section was empty (tag for an unreleased version),
          # fall back to a generic notice rather than failing the release.
          if [ ! -s release-notes.md ]; then
            echo "No CHANGELOG entry found for v${VERSION}; using a placeholder." >&2
            echo "Release notes pending — see [CHANGELOG.md](./CHANGELOG.md)." > release-notes.md
          fi
          echo "Release notes:"
          cat release-notes.md
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes-file release-notes.md \
            dist/hanko-*
